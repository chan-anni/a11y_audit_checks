name: Accessibility Audit Practice

on: [push, pull_request]

jobs:
  audit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write   # Gives the token permission to post text reviews
      checks: write

    steps:
      - name: Checkout target code
        uses: actions/checkout@v4

      - name: Run Accessibility Audit
        uses: chan-anni/a11y-context-checker@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}       # <-- PASS THIS INHERENT TOKEN
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # <-- PASS YOUR AI KEY